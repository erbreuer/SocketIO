<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Socket Chat</title>
    </head>
    <body>
        <h1>Rooms in Socket IO</h1>
        <button onclick="joinRoom(1)">Raum 1 betreten</button>
        <button id="leaveBtn1" onclick="leaveRoom(1)" style="display: none">
            Raum 1 verlassen
        </button>
        <button onclick="joinRoom(2)">Raum 2 betreten</button>
        <button id="leaveBtn2" onclick="leaveRoom(2)" style="display: none">
            Raum 2 verlassen
        </button>
        <p id="roomStatus">Aktuelle Räume: keine</p>

        <ul id="messages"></ul>

        <input id="msg" placeholder="Nachricht eingeben" />
        <button onclick="sendMessage()">Send</button>

        <script src="/socket.io/socket.io.js"></script>
        <script src="rooms.js"></script>
    </body>
</html>
