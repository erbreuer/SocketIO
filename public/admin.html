<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Admin Dashboard - Socket.IO</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="container">
            <h1>Admin Dashboard</h1>

            <!-- Login Section -->
            <div id="loginSection">
                <h2>Admin Login</h2>
                <div class="form-group">
                    <p></p>Please enter the admin password:</p>
                    <input type="password" id="password" placeholder="Password" />
                    <div id="loginError" class="error" style="display: none"></div>
                    <button onclick="login()">Login</button>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboard" class="hidden">
                <div id="status" class="status">Connecting...</div>

                <div class="section">
                    <h3>Namespaces</h3>
                    <div id="namespacesList" class="namespace-list">Loading...</div>
                </div>

                <div class="section">
                    <h3>Connected Sockets</h3>
                    <div class="stat-item">
                        <span id="connectedCount" class="stat-value">0</span>
                    </div>
                </div>

                <div class="section">
                    <h3>Total Messages Sent</h3>
                    <div class="stat-item">
                        <span id="totalMessages" class="stat-value">0</span>
                    </div>
                </div>

                <div class="section">
                    <h3>Socket Statistics</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Socket ID</th>
                                <th>Namespace</th>
                                <th>Rooms</th>
                                <th>Messages Sent</th>
                            </tr>
                        </thead>
                        <tbody id="socketTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center">No data available</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="broadcast-section">
                    <h3>Broadcast Message to All</h3>
                    <div class="form-group">
                        <input
                            type="text"
                            id="broadcastMessage"
                            placeholder="Enter message..."
                        />
                        <button onclick="sendFromAdminDashboard()">
                            Send to All
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="admin.js"></script>
    </body>
</html>
